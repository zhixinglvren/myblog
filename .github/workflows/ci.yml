name: Deploy

on:
  push:
    branches: [master]

permissions:
  contents: write

env:
  TZ: Asia/Shanghai

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 16

      - name: Build
        run: |
          npm install
          npm run build
          echo "=== dist ==="
          ls docs/.vuepress/dist/ | head -20

      - name: Deploy
        run: |
          cd docs/.vuepress/dist
          touch .nojekyll
          git init
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git commit -m "deploy"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:gh-pages
