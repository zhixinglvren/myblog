name: Deploy

on:
  push:
    branches: [master]

permissions:
  contents: write

env:
  TZ: Asia/Shanghai

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 16

      - name: Install
        run: |
          yarn install
          echo "=== node-version ==="
          node --version

      - name: Build
        run: |
          yarn build
          echo "=== dist contents ==="
          ls -la docs/.vuepress/dist/ 2>&1 || echo "DIST NOT FOUND"

      - name: Deploy
        run: |
          if [ ! -d "docs/.vuepress/dist" ]; then
            echo "ERROR: dist directory does not exist"
            exit 1
          fi
          cd docs/.vuepress/dist
          touch .nojekyll
          cp ../../index.html . 2>/dev/null || true
          git init
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git commit -m "deploy"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:gh-pages
