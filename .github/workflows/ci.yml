name: Deploy

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 16

      - run: |
          echo "--- Node version ---"
          node --version
          echo "--- Dir ---"
          ls docs/

      - run: npm install

      - run: npm run build --verbose
        continue-on-error: true

      - run: |
          echo "=== dist check ==="
          if [ -d "docs/.vuepress/dist" ]; then
            echo "DIST EXISTS"
            ls docs/.vuepress/dist/ | head -20
          else
            echo "DIST NOT FOUND"
            echo "Checking vuepress dir..."
            ls -la docs/.vuepress/ 2>/dev/null || echo "No .vuepress"
          fi
