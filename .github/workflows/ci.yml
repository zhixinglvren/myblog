name: Deploy

on:
  push:
    branches: [master]

permissions:
  contents: write

env:
  TZ: Asia/Shanghai

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 16

      - name: Build
        run: |
          yarn install
          yarn build
          echo "Build done, contents of dist:"
          ls -la docs/.vuepress/dist/
          echo "Has index.html?"
          test -f docs/.vuepress/dist/index.html && echo "YES" || echo "NO"

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/.vuepress/dist
          publish_branch: gh-pages
          force_orphan: true
          enable_jekyll: false
