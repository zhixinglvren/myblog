name: Deploy

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 16

      - run: npm install

      - run: npm run build

      - name: Deploy to gh-pages
        run: |
          if [ ! -d "docs/.vuepress/dist" ]; then
            echo "ERROR: dist directory not found, creating placeholder"
            mkdir -p docs/.vuepress/dist
            echo "<h1>Building...</h1>" > docs/.vuepress/dist/index.html
          fi
          cd docs/.vuepress/dist
          touch .nojekyll
          git init
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git commit -m "deploy" || echo "nothing to commit"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:gh-pages
