name: Deploy

on:
  push:
    branches: [master]

permissions:
  contents: write
  actions: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 16

      - run: npm install

      - name: Build
        id: build
        run: npm run build 2>&1 | tee build.log
        continue-on-error: true

      - name: Upload build log
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Check dist
        run: |
          if [ -d "docs/.vuepress/dist/index.html" ]; then
            echo "Build succeeded"
          elif [ -d "docs/.vuepress/dist" ]; then
            echo "Dist exists but no index.html"
            ls -la docs/.vuepress/dist/
          else
            echo "Dist not found"
          fi
